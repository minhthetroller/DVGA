{{define "module_api"}}
{{.Content}}
{{if .MoreInfo}}
<div class="more-info">
<h3>More Information</h3>
<ul>
{{range .MoreInfo}}
<li><a href="{{.}}" target="_blank" rel="noopener">{{.}}</a></li>
{{end}}
</ul>
</div>
{{end}}
<div class="hint-section" style="margin-top:1.5rem">
<button id="hint-btn" data-hints="{{.HintsJSON}}" onclick="loadHint()">Show Hint (1/4)</button>
<p id="hint-text" style="margin-top:0.5rem;font-style:italic;color:#666"></p>
</div>
<script>
(function(){
  var level = 1;
  var btn = document.getElementById("hint-btn");
  var hints = JSON.parse(btn.getAttribute("data-hints") || "[]");
  var total = hints.length;
  window.loadHint = function() {
    if (level > total) return;
    var el = document.getElementById("hint-text");
    el.textContent = "Hint " + level + "/" + total + ": " + hints[level - 1];
    level++;
    if (level > total) {
      btn.textContent = "No more hints";
      btn.disabled = true;
    } else {
      btn.textContent = "Show Hint (" + level + "/" + total + ")";
    }
  };
})();
</script>
{{end}}
